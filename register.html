<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOI Register</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow-x:hidden;

    background:
    linear-gradient(
    rgba(38,140,83,0.92),
    rgba(38,140,83,0.92)),

    url("https://images.unsplash.com/photo-1503387762-592deb58ef4e?q=80&w=1400");

    background-size:cover;
    background-position:center;

    padding:20px;

    animation:
    pageEnter 0.4s ease;

}



/* PAGE ENTER */

@keyframes pageEnter{

    from{

        opacity:0;

        transform:
        translateX(40px);

    }

    to{

        opacity:1;

        transform:
        translateX(0);

    }

}



/* CARD */

.auth-card{

    width:100%;
    max-width:520px;

    background:white;

    border-radius:30px;

    padding:40px;

    position:relative;

    overflow:hidden;

    box-shadow:
    0 20px 60px rgba(0,0,0,0.15);

}



/* INPUT */

.input-box{

    width:100%;

    padding:14px 16px 14px 45px;

    border:1px solid #dbe2ea;

    border-radius:14px;

    outline:none;

    background:#f8fafc;

    font-size:14px;

    transition:0.3s;

}


.input-box:focus{

    border-color:#2E8B57;

    background:white;

    box-shadow:
    0 0 0 4px rgba(46,139,87,0.12);

}



/* BUTTON */

.main-btn{

    width:100%;

    background:#2E8B57;

    color:white;

    border:none;

    padding:14px;

    border-radius:14px;

    font-size:14px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;

}


.main-btn:hover{

    background:#256f46;

    transform:translateY(-2px);

}



/* STEP 2 */

#form-step-2{

    display:none;

}

</style>

</head>
<body>



<div class="auth-card">


<!-- STEP TOP -->

<div class="flex items-center justify-between mb-10">

    <div class="flex items-center gap-3">

        <div id="badge1"
        class="w-9 h-9 rounded-full bg-[#2E8B57] text-white flex items-center justify-center text-sm font-semibold">

            1

        </div>

        <div class="w-12 h-[2px] bg-slate-200"></div>

        <div id="badge2"
        class="w-9 h-9 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center text-sm font-semibold">

            2

        </div>

    </div>

    <span id="stepText"
    class="text-xs uppercase tracking-wide text-slate-400 font-semibold">

        Step 1 of 2

    </span>

</div>





<!-- STEP 1 -->

<div id="form-step-1">


<div class="mb-8">

    <h1 class="text-3xl font-bold text-slate-900">
        Create Account
    </h1>

    <p class="text-slate-500 mt-2 text-sm">
        Enter your personal details
    </p>

</div>



<div class="space-y-4">


<!-- FULL NAME -->

<div class="relative">

    <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>

    <input
    type="text"
    class="input-box"
    placeholder="Full Name"
    required>

</div>



<!-- EMAIL -->

<div class="relative">

    <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>

    <input
    type="email"
    class="input-box"
    placeholder="Email Address"
    required>

</div>



<!-- PHONE -->

<div class="relative">

    <i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>

    <input
    type="tel"
    class="input-box"
    placeholder="Phone Number"
    required
    pattern="[0-9]{10}">

</div>



<!-- PASSWORD -->

<div class="relative">

    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>

    <input
    type="password"
    class="input-box"
    placeholder="Password"
    required>

</div>



<!-- CONFIRM PASSWORD -->

<div class="relative">

    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>

    <input
    type="password"
    class="input-box"
    placeholder="Confirm Password"
    required>

</div>



<!-- BUTTON -->

<button
type="button"
onclick="goToStep2()"
class="main-btn mt-2">

    Continue to Company Details

</button>



<div class="text-center pt-3">

    <p class="text-sm text-slate-500">

        Already have an account?

        <a href="login.html"
        class="text-[#2E8B57] font-semibold hover:underline">

            Sign In

        </a>

    </p>

</div>


</div>

</div>






<!-- STEP 2 -->

<div id="form-step-2">


<div class="mb-8">

    <h1 class="text-3xl font-bold text-slate-900">
        Company Details
    </h1>

    <p class="text-slate-500 mt-2 text-sm">
        Setup your organization
    </p>

</div>



<div class="space-y-4">


<!-- COMPANY -->

<div class="relative">

    <i class="fa-regular fa-building absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>

    <input
    type="text"
    class="input-box"
    placeholder="Company Name"
    required>

</div>



<!-- INDUSTRY -->

<div class="relative">

    <i class="fa-solid fa-industry absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>

    <select class="input-box appearance-none" required>

        <option value="" disabled selected>
            Select Industry
        </option>

        <option>Manufacturing</option>

        <option>Textile</option>

        <option>Dyeing</option>

    </select>

</div>



<!-- LOCATION -->

<div class="grid grid-cols-3 gap-3">


<!-- STATE -->

<select
id="state"
required
class="border border-slate-200 rounded-xl px-3 py-3 outline-none focus:border-[#2E8B57] bg-white text-sm">

    <option value="">
        State
    </option>

</select>



<!-- DISTRICT -->

<select
id="district"
required
class="border border-slate-200 rounded-xl px-3 py-3 outline-none focus:border-[#2E8B57] bg-white text-sm">

    <option value="">
        District
    </option>

</select>



<!-- CITY -->

<select
id="city"
required
class="border border-slate-200 rounded-xl px-3 py-3 outline-none focus:border-[#2E8B57] bg-white text-sm">

    <option value="">
        City
    </option>

</select>


</div>



<!-- ROLE -->

<div class="relative">

    <i class="fa-regular fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>

    <select class="input-box appearance-none" required>

        <option value="" disabled selected>
            Select Role
        </option>

        <option>Owner</option>

        <option>Manager</option>

        <option>Operator</option>

    </select>

</div>



<!-- BUTTONS -->

<div class="flex gap-3 pt-3">


<button
type="button"
onclick="goToStep1()"
class="w-1/3 border border-slate-200 hover:bg-slate-50 text-slate-600 py-3 rounded-xl font-semibold transition-all">

    Back

</button>


<button
type="button"
onclick="createAccount()"
class="w-2/3 main-btn">

    Create Account

</button>


</div>

</div>

</div>


</div>





<script>

const step1 = document.getElementById("form-step-1");

const step2 = document.getElementById("form-step-2");

const badge1 = document.getElementById("badge1");

const badge2 = document.getElementById("badge2");

const stepText = document.getElementById("stepText");



const password =
document.querySelectorAll('input[placeholder="Password"]')[0];

const confirmPassword =
document.querySelector('input[placeholder="Confirm Password"]');




// STEP 2

function goToStep2(){


    const inputs =
    step1.querySelectorAll("input");


    for(let input of inputs){

        if(!input.checkValidity()){

            input.reportValidity();

            return;
        }

    }



    if(password.value !== confirmPassword.value){

        alert("Passwords do not match");

        return;
    }



    step1.style.display = "none";

    step2.style.display = "block";



    badge1.classList.remove(
    "bg-[#2E8B57]",
    "text-white"
    );

    badge1.classList.add(
    "bg-green-100",
    "text-[#2E8B57]"
    );



    badge2.classList.remove(
    "bg-slate-100",
    "text-slate-400"
    );

    badge2.classList.add(
    "bg-[#2E8B57]",
    "text-white"
    );



    stepText.innerText = "Step 2 of 2";

}




// BACK STEP 1

function goToStep1(){


    step2.style.display = "none";

    step1.style.display = "block";



    badge1.classList.remove(
    "bg-green-100",
    "text-[#2E8B57]"
    );

    badge1.classList.add(
    "bg-[#2E8B57]",
    "text-white"
    );



    badge2.classList.remove(
    "bg-[#2E8B57]",
    "text-white"
    );

    badge2.classList.add(
    "bg-slate-100",
    "text-slate-400"
    );



    stepText.innerText = "Step 1 of 2";

}




// CREATE ACCOUNT

function createAccount(){


    const inputs =
    step2.querySelectorAll("input, select");


    for(let input of inputs){

        if(!input.checkValidity()){

            input.reportValidity();

            return;
        }

    }



    alert("Account Created Successfully");


    window.location.href =
    "login.html";

}


// ==========================
// LOCATION DATA
// ==========================

const locationData = {

    "Tamil Nadu": {

        "Chennai": [
            "Tambaram",
            "Guindy",
            "T Nagar"
        ],

        "Coimbatore": [
            "Gandhipuram",
            "RS Puram",
            "Peelamedu"
        ],

        "Tiruppur": [
            "Avinashi",
            "Palladam",
            "Dharapuram"
        ]

    },



    "Karnataka": {

        "Bangalore": [
            "Whitefield",
            "Indiranagar",
            "Electronic City"
        ],

        "Mysore": [
            "Nazarbad",
            "VV Mohalla"
        ]

    }

};



// ==========================
// ELEMENTS
// ==========================

const stateSelect =
document.getElementById("state");

const districtSelect =
document.getElementById("district");

const citySelect =
document.getElementById("city");



// ==========================
// LOAD STATES
// ==========================

for(let state in locationData){

    stateSelect.innerHTML +=
    `<option value="${state}">
        ${state}
    </option>`;
}



// ==========================
// STATE CHANGE
// ==========================

stateSelect.addEventListener("change", function(){


    districtSelect.innerHTML =
    `<option value="">District</option>`;

    citySelect.innerHTML =
    `<option value="">City</option>`;


    let districts =
    locationData[this.value];


    for(let district in districts){

        districtSelect.innerHTML +=
        `<option value="${district}">
            ${district}
        </option>`;
    }

});



// ==========================
// DISTRICT CHANGE
// ==========================

districtSelect.addEventListener("change", function(){


    citySelect.innerHTML =
    `<option value="">City</option>`;


    let cities =
    locationData[
        stateSelect.value
    ][
        this.value
    ];


    cities.forEach(city => {

        citySelect.innerHTML +=
        `<option value="${city}">
            ${city}
        </option>`;

    });

});


</script>

</body>
</html>
